<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>שיבוץ לכיבוד 🥦 · חסלט</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DV2SVGBYD7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DV2SVGBYD7');
  </script>

  <meta name="description" content="נשארים תמיד עם הדברים הכי מסובכים להכנה שצריך להביא למסיבה בגן? זה כי לא התאמנתם מספיק. הגיע הזמן ››" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="בואו להשתבץ ראשונים בכיבוד למסיבה" />
  <meta property="og:description" content="נשארים תמיד עם הדברים הכי מסובכים להכנה שצריך להביא למסיבה בגן? זה כי לא התאמנתם מספיק. הגיע הזמן ››" />
  <meta property="og:image" content="https://orisamuel.github.io/hasalat-kibud/assets/logo.jpg" />
  <meta property="og:locale" content="he_IL" />
  <meta name="theme-color" content="#6FB23C" />

  <link rel="icon" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Gveret+Levin&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <button class="mute" id="muteBtn" aria-label="כיבוי/הדלקת סאונד" title="סאונד">🔊</button>

  <main class="app">

    <!-- ===================== WHATSAPP INTRO ===================== -->
    <section class="screen wa is-active" id="screen-chat">
      <div class="wa__bar">
        <span class="wa__back">‹</span>
        <div class="wa__avatar" id="waAvatar">🌸</div>
        <div class="wa__id">
          <strong id="waName">קבוצת הגן</strong>
          <span id="waSub">12 משתתפים</span>
        </div>
        <span class="wa__icons">📞 ⋮</span>
      </div>

      <div class="wa__chat" id="waChat">
        <div class="wa__date">היום</div>
        <div class="wa__enc">🔒 ההודעות מוצפנות מקצה לקצה. גם הכרובית.</div>
      </div>

      <div class="wa__footer">
        <div class="wa__hint" id="waHint" hidden>👆 לחצו על הקישור כדי להשתבץ</div>
        <button class="wa__skip" id="skipBtn">דלג ⏭️</button>
      </div>
    </section>

    <!-- ===================== SIGN-UP TABLE ===================== -->
    <section class="screen screen--table" id="screen-table">
      <header class="topbar">
        <div class="logo-card logo-card--mini"><img src="assets/logo.jpg" alt="חסלט" /></div>
        <div class="titles">
          <h1 class="title">טבלת השיבוץ</h1>
          <p class="subtitle" id="tableSub">כיבוד · מסיבת סוף שנה</p>
        </div>
      </header>

      <div class="status" id="status">פותח את הטבלה…</div>

      <section class="sheet" aria-label="טבלת שיבוץ לכיבוד">
        <div class="sheet__head">
          <span class="sheet__h1">מה מביאים</span>
          <span class="sheet__h2">מי שובץ</span>
        </div>
        <ul class="rows" id="rows"></ul>
      </section>

      <p class="sponsor">בחסות <b>חסלט</b> · ירק נקי, בלי חרקים</p>
    </section>

    <!-- ===================== RESULT OVERLAY ===================== -->
    <div class="overlay" id="overlay">
      <canvas class="confetti" id="confetti"></canvas>
      <div class="result-card" id="resultCard">
        <button class="result__close" id="closeBtn" aria-label="סגירה">✕</button>
        <div class="result__stamp" id="resultStamp">נגמר.</div>
        <h2 class="result__title" id="resultTitle"></h2>
        <p class="result__sub" id="resultSub"></p>

        <div class="result__left" id="resultLeft"></div>

        <p class="result__brand" id="resultBrand"></p>

        <div class="logo-card logo-card--result"><img src="assets/logo.jpg" alt="חסלט — הטעם הנקי של הטבע" /></div>

        <div class="result__actions">
          <button class="btn btn--share" id="shareBtn">📲 שתפו את הבושה</button>
          <button class="btn btn--again" id="againBtn">🔁 עוד ניסיון</button>
        </div>
      </div>
    </div>

    <button class="replay-fab" id="replayFab" hidden>🔁 עוד ניסיון</button>

  </main>

  <script src="game.js?v=8"></script>
</body>
</html>
