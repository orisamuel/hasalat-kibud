<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>טבלת הכיבוד 🥦 · חסלט</title>

  <meta name="description" content="טבלת ההרשמה לכיבוד של מסיבת הגן. רשמו את שמכם ליד מה שתביאו — אבל מהרו, כי איך שמתחילים נשארת רק כרובית ללא חרקים. בחסות חסלט — הטעם הנקי של הטבע." />

  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="טבלת הכיבוד 🥦 — תנסו להירשם לפיתות. ספוילר: נשארה רק כרובית." />
  <meta property="og:description" content="כל ההורים מתנפלים על הטבלה ותופסים את הקלים. לך נשארת רק כרובית ללא חרקים. בחסות חסלט 🌱" />
  <meta property="og:image" content="https://orisamuel.github.io/hasalat-kibud/assets/logo.jpg" />
  <meta property="og:locale" content="he_IL" />
  <meta name="theme-color" content="#6FB23C" />

  <link rel="icon" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&family=Gveret+Levin&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button class="mute" id="muteBtn" aria-label="כיבוי/הדלקת סאונד" title="סאונד">🔊</button>

  <main class="app">

    <header class="topbar">
      <div class="logo-card logo-card--mini">
        <img src="assets/logo.jpg" alt="חסלט — סלי קטיף כפר דרום" />
      </div>
      <div class="titles">
        <h1 class="title">טבלת הכיבוד 🎉</h1>
        <p class="subtitle">מסיבת סוף שנה · הגן של הילדים</p>
      </div>
    </header>

    <div class="coach">
      <div class="coach__avatar" id="coachAvatar"></div>
      <div class="bubble" id="coachBubble">רשמו את שמכם ליד מה שתביאו — מי שמקדים זוכה בקלים! 💪</div>
    </div>

    <section class="sheet" aria-label="טבלת הרשמה לכיבוד">
      <div class="sheet__head">
        <span class="sheet__h1">מה מביאים</span>
        <span class="sheet__h2">מי מביא ✍️</span>
      </div>
      <ul class="rows" id="rows"><!-- injected by JS --></ul>
    </section>

    <button class="btn btn--go pop-in" id="startBtn">🖊️ יאללה, תרשמו אותי לפיתות!</button>

    <p class="sponsor">בחסות <b>חסלט</b> · הטעם הנקי של הטבע 🌱</p>

    <!-- ===== result overlay ===== -->
    <div class="overlay" id="overlay" hidden>
      <canvas class="confetti" id="confetti"></canvas>
      <div class="result-card" id="resultCard">
        <div class="result__stamp">נרשמת בהצלחה ל־</div>
        <div class="result__emoji">🥦</div>
        <div class="result__item">כרובית ללא חרקים</div>
        <p class="result__hello" id="resultHello"></p>
        <p class="result__brand">
          באדיבות <b>חסלט</b> — ירק נקי, בלי חרקים, בלי שאריות חומרי הדברה.
        </p>

        <ul class="result__stats" id="resultStats"></ul>
        <p class="result__punch" id="resultPunch"></p>

        <div class="logo-card logo-card--result">
          <img src="assets/logo.jpg" alt="חסלט — הטעם הנקי של הטבע" />
        </div>

        <div class="result__actions">
          <button class="btn btn--share" id="shareBtn">📲 שתפו בוואטסאפ</button>
          <button class="btn btn--again" id="againBtn">🔁 שחקו שוב</button>
        </div>
      </div>
    </div>

  </main>

  <script src="game.js"></script>
</body>
</html>
